<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="content.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="qbrow-overlay">
    <div id="qbrow-palette">
      <div id="qbrow-input-row">

      </div>
      <ul id="qbrow-results" role="listbox"></ul>
    </div>
  </div>
  <script src="palette.js"></script>
</body>
</html>
